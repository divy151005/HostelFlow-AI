server.port=8080
spring.application.name=hostelflow-backend

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/hostelflow
spring.data.mongodb.database=hostelflow

# JWT
app.jwt.secret=HostelFlowAI_SuperSecret_JWT_Key_2024_ChangeMeInProduction_256Bits_Secure
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# AI Service
app.ai.service.url=http://localhost:8000

# QR Config
app.qr.size=300
app.qr.base-url=http://localhost:8080/api/qr/verify

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.hostelflow=DEBUG
logging.level.org.springframework.security=INFO

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
