version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: hostelflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./database/seed.js:/docker-entrypoint-initdb.d/seed.js:ro
    environment:
      MONGO_INITDB_DATABASE: hostelflow
    networks:
      - hostelflow-net

  # ── Spring Boot Backend ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hostelflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/hostelflow
      APP_JWT_SECRET: HostelFlowAI_SuperSecret_JWT_Key_2024_ChangeMeInProduction_256Bits_Secure
      APP_AI_SERVICE_URL: http://ai-service:8000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - hostelflow-net

  # ── Python AI Service ────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: hostelflow-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - hostelflow-net

  # ── React Frontend ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hostelflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hostelflow-net

volumes:
  mongo_data:

networks:
  hostelflow-net:
    driver: bridge
